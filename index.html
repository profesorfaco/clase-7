<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ELECTIVOS DE DISEÑO</title>
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --color-oscurisimo: hsl(120, 50%, 10%);
                --color-oscuro: hsl(120, 50%, 30%);
                --color-normal: hsl(120, 50%, 50%);
                --color-iluminado: hsl(120, 50%, 70%);;
                --color-iluminadisimo: hsl(120, 50%, 90%);
                --fuente-serifa:Georgia, serif;
                --fuente-palote:Helvetica, sans-serif;
            }

            body {
                font-family: var(--fuente-palote);
                color: var(--color-normal);
                text-align: center;
                font-size: 100%;
            }
            div#contenedor {
                margin: 1rem auto;
                width: 90%;
                max-width: 780px;
            }

            h1 {
                margin: 1rem 0;
                font-weight: 400;
                font-size: calc(100% + 3vw + 3vh);
            }

            h2 {
                margin: 3rem 0;
                font-weight: 400;
                letter-spacing: 0.25rem;
                font-size: calc(100% + 1vw + 1vh);
                color: var(--color-oscuro);
            }

            input {
                border: 0.1rem solid var(--color-iluminado);
                padding: 0.5rem 1rem;
                font-family: inherit;
                font-size: 15px;
                color: var(--color-oscuro);
                outline: none;
                margin-bottom: 1.5rem;
                width: 100%;
                display: block;
                background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10.15,61.5H25.77V68H10.15a3.13,3.13,0,0,1-3.08-3.08v-.49A3.1,3.1,0,0,1,10.15,61.5Zm0,18.33H25.77v6.52H10.15a3.11,3.11,0,0,1-3.08-3V82.9A3.12,3.12,0,0,1,10.15,79.83ZM23.92,37.27H19v-24a4.09,4.09,0,0,1,4.06-4h49.7a4.08,4.08,0,0,1,4,4v.87H23.92ZM19,43.05v-.86H71.89V19.06h4.92l7.51,1.23V35.55l-7.51,1.72v5.78a4.09,4.09,0,0,1-4,4.06H23.06A4.1,4.1,0,0,1,19,43.05Zm9.84-5.17V18.45H39.67V37.88ZM92.93,77.74H71.28a16.85,16.85,0,0,1-16.36,13H31.3V57.07H54.92A16.88,16.88,0,0,1,71.28,70H92.93Z"></path></svg>');
                background-repeat: no-repeat;
                background-size: 1rem;
                background-position:99% center;
            }

            input::placeholder {
                color: var(--color-iluminado);
            }

            input:focus {
                border-color: var(--color-normal);
            }

            div#contenedordetabla {
                overflow-x: auto;
                font-size: 90%;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
                margin-bottom: 3rem;
            }

            thead {
                background: var(--color-iluminado);
            }

            td,
            th {
                border: 1px solid var(--color-normal);
                padding: 0.75rem;
            }

            td:nth-child(1),
            th:nth-child(1),
            td:nth-child(3),
            th:nth-child(3) {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>ᕙ( •̀ ᗜ •́ )ᕗ</h1>
            <h2>ELECTIVOS DE DISEÑO</h2>
            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>N°</th>
                            <th>Asignatura electiva</th>
                            <th>Mención</th>
                            <th>Grupo</th>
                            <th>Enfoque</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");

            const URL = "https://api.myjson.online/v1/records/520d3676-e35b-469b-9be6-9175b4908ad7";
            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.id}</td><td>${x.name}</td><td>${x.track}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
